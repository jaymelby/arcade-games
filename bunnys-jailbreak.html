                    if (this.keyJustPressed["Space"] || this.keyJustPressed["Enter"]) {
                        this.showingNote = null;
                    }
                    return;
                }

                // Freeze frame
                if (this.freezeTimer > 0) {
                    this.freezeTimer -= dt;
                    this.particles.update(dt);
                    for (let i = this.textPopups.length - 1; i >= 0; i--) {
                        this.textPopups[i].update(dt);
                        if (this.textPopups[i].dead) this.textPopups.splice(i, 1);
                    }
                    return;
                }

                // Speedrun timer (#10)
                this.playTimer += dt;

                // Day/Night (#1)
                this.dayNight.update(dt);

                // Music (#6)
                const nightAmt = this.dayNight.nightAmount;
                if (this.rex.state !== "chase" && this.rex.state !== "sniff") {
                    this.music.setState(nightAmt > 0.5 ? "night" : "calm");
                }
                this.music.update(dt, nightAmt);

                // Scent (#5)
                this.scentTrail.update(dt, this.player.x, this.player.y, this.player.isHiding);
                // Erase scent near water
                for (let r = 0; r < MAP_ROWS; r++) {
                    for (let c = 0; c < MAP_COLS; c++) {
                        if (tileAt(c, r) === 8) {
                            const wc = tileCenter(c, r);
                            this.scentTrail.eraseNear(wc.x, wc.y, CONFIG.TILE_SIZE);
                        }
                    }
                }

                this.player.update(dt, this.keys, this);
                this.rex.update(dt, this);

                // Followers (#3)
                for (const f of this.followers) f.update(dt, this);

                // Thrown sticks (#7)
                for (let i = this.thrownSticks.length - 1; i >= 0; i--) {
                    this.thrownSticks[i].update(dt);
                    if (!this.thrownSticks[i].flying) {
                        const s = this.thrownSticks[i];
                        this.particles.emitStickLand(s.x, s.y);
                        // If Rex is not in fetch state, send him to fetch
                        if (this.rex.state !== "fetch") {
                            this.rex.startFetch(s.x, s.y);
                            this.textPopups.push(new TextPopup(this.rex.x, this.rex.y - 30, "FETCH!", "#44cc44", 22, 1.0));
                            this.music.setState("calm");
                        }
                        this.thrownSticks.splice(i, 1);
                    }
                }

                // Stick pickups (#7)
                for (const sp of this.stickPickups) sp.update(dt, this);

                // Lore notes (#9)
                for (const ln of this.loreNotes) ln.update(dt, this);

                // Bunnies
                for (const b of this.stuckBunnies) b.update(dt);

                // Checkpoints — activate & deposit followers (#3)
                for (const cp of this.checkpoints) {
                    cp.update(dt);
                    if (!cp.activated && dist(this.player.x, this.player.y, cp.x, cp.y) < 30) {
                        cp.activated = true;
                        this.activeCheckpoint = cp;
                        this.audio.playCheckpoint();
                        this.textPopups.push(new TextPopup(cp.x, cp.y - 20, "Checkpoint!", "#ffcc00", 18, 1.0));
                    }
                    // Deposit followers at any activated checkpoint
                    if (cp.activated && this.followers.length > 0 && dist(this.player.x, this.player.y, cp.x, cp.y) < 35) {
                        this._depositFollowers(cp);
                    }
                }

                // Camera
                this.camera.follow(this.player.x, this.player.y, dt);

                // Particles
                this.particles.update(dt);

                // Text popups
                for (let i = this.textPopups.length - 1; i >= 0; i--) {
                    this.textPopups[i].update(dt);
                    if (this.textPopups[i].dead) this.textPopups.splice(i, 1);
                }
                break;

            case "gameover":
            case "win":
                if (this.keyJustPressed["Enter"] || this.keyJustPressed["KeyR"]) this.restart();
                this.particles.update(dt);
                for (let i = this.textPopups.length - 1; i >= 0; i--) {
                    this.textPopups[i].update(dt);
                    if (this.textPopups[i].dead) this.textPopups.splice(i, 1);
                }
                break;
        }
    }

    _draw() {
        const ctx = this.ctx;
        const cam = this.camera;

        ctx.fillStyle = "#2a3a2a";
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

        switch (this.state) {
            case "title":
                this._drawTitle(ctx);
                break;

            case "paused":
                this._drawPause(ctx);
                break;

            case "playing":
            case "gameover":
            case "win":
                // Apply zoom (#8)
                ctx.save();
                if (cam.zoom !== 1) {
                    const cx = CONFIG.CANVAS_WIDTH / 2, cy = CONFIG.CANVAS_HEIGHT / 2;
                    ctx.translate(cx, cy);
                    ctx.scale(cam.zoom, cam.zoom);
                    ctx.translate(-cx, -cy);
                }

                const nightAmount = this.dayNight.nightAmount;

                // World
                this.mapRenderer.draw(ctx, cam);

                // Scent trail debug visual (subtle)
                if (this.scentTrail.points.length > 0) {
                    ctx.globalAlpha = 0.08;
                    for (const p of this.scentTrail.points) {
                        const a = p.life / p.maxLife;
                        ctx.fillStyle = "#ffaa00";
                        ctx.globalAlpha = a * 0.1;
                        ctx.beginPath();
                        ctx.arc(p.x - cam.ex, p.y - cam.ey, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                }

                // Checkpoints
                for (const cp of this.checkpoints) cp.draw(ctx, cam, nightAmount);

                // Lore notes (#9)
                for (const ln of this.loreNotes) ln.draw(ctx, cam);

                // Stick pickups (#7)
                for (const sp of this.stickPickups) sp.draw(ctx, cam);

                // Stuck bunnies
                for (const b of this.stuckBunnies) b.draw(ctx, cam, nightAmount);

                // Followers (#3)
                for (const f of this.followers) f.draw(ctx, cam);

                // Thrown sticks
                for (const s of this.thrownSticks) s.draw(ctx, cam);

                // Rex
                this.rex.draw(ctx, cam, nightAmount);

                // Player
                this.player.draw(ctx, cam);

                // Particles
                this.particles.draw(ctx, cam);

                // Rescue progress
                this.hud.drawRescueProgress(ctx, cam, this);

                // Text popups
                for (const tp of this.textPopups) tp.draw(ctx, cam);

                // Day/Night lighting overlay (#1)
                this.dayNight.drawLighting(ctx, cam, this);

                ctx.restore(); // End zoom

                // HUD (on top of everything, not affected by zoom)
                this.hud.draw(ctx, this);

                // Minimap
                this.minimap.draw(ctx, this);

                // Lore note popup (#9)
                if (this.showingNote) this._drawNotePopup(ctx, this.showingNote);

                // Overlays
                if (this.state === "gameover") this._drawGameOver(ctx);
                if (this.state === "win") this._drawWin(ctx);
                break;
        }
    }

    _drawTitle(ctx) {
        const cx = CONFIG.CANVAS_WIDTH / 2, cy = CONFIG.CANVAS_HEIGHT / 2;
        const grad = ctx.createLinearGradient(0, 0, 0, CONFIG.CANVAS_HEIGHT);
        grad.addColorStop(0, "#1a3a1a"); grad.addColorStop(1, "#0a200a");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

        ctx.fillStyle = "#2a5a2a";
        for (let i = 0; i < 30; i++) {
            const x = (i * 37 + this.gameTime * 10) % CONFIG.CANVAS_WIDTH;
            const y = 100 + (i * 29) % (CONFIG.CANVAS_HEIGHT - 200);
            ctx.fillRect(x, y, 2, 12 + Math.sin(this.gameTime + i) * 4);
        }

        ctx.font = "bold 52px Arial"; ctx.fillStyle = "#fff";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("🐰 Bunny's Jailbreak! 🐰", cx, cy - 120);

        ctx.font = "18px Arial"; ctx.fillStyle = "#aaddaa";
        ctx.fillText("Sir Fluffles must rescue the citizens of Bun Bun City!", cx, cy - 70);

        ctx.font = "15px Arial"; ctx.fillStyle = "#88bb88";
        const instructions = [
            "WASD / Arrows — Move      SPACE — Dash",
            "E (hold) — Rescue bunnies   Q — Hide in bushes",
            "F (hold) — Aim stick, release to throw",
            "",
            "Rescue bunnies then bring them to a 🥕 Checkpoint to bank them!",
            "Beware: Rex scatters your followers if he catches you!",
            "Day turns to night — your visibility shrinks, Rex hears better!",
            "",
            "🐕 Avoid Rex!   📜 Find lore notes!   ⭐ Race the clock!",
            "",
            "ESC — Pause Menu",
        ];
        instructions.forEach((line, i) => ctx.fillText(line, cx, cy - 20 + i * 24));

        // Best time
        if (this.bestTime > 0) {
            const bm = Math.floor(this.bestTime / 60), bs = Math.floor(this.bestTime % 60);
            ctx.font = "bold 14px Arial"; ctx.fillStyle = "#ffcc44";
            ctx.fillText(`Best Time: ${String(bm).padStart(2,"0")}:${String(bs).padStart(2,"0")}`, cx, cy + 200);
        }

        ctx.font = "bold 22px Arial"; ctx.fillStyle = "#fff";
        ctx.globalAlpha = 0.5 + Math.sin(this.gameTime * 3) * 0.5;
        ctx.fillText("Press ENTER or SPACE to Start", cx, cy + 230);
        ctx.globalAlpha = 1;
    }

    _drawNotePopup(ctx, note) {
        // Semi-transparent overlay
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

        const cx = CONFIG.CANVAS_WIDTH / 2, cy = CONFIG.CANVAS_HEIGHT / 2;
        // Parchment background
        ctx.fillStyle = "#f4e4c1";
        const pw = 500, ph = 250;
        ctx.fillRect(cx - pw/2, cy - ph/2, pw, ph);
        ctx.strokeStyle = "#8B7355"; ctx.lineWidth = 3;
        ctx.strokeRect(cx - pw/2, cy - ph/2, pw, ph);

        // Title
        ctx.font = "bold 18px 'Georgia', serif"; ctx.fillStyle = "#4a3520";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(`📜 ${note.title}`, cx, cy - ph/2 + 30);

        // Body text
        ctx.font = "14px 'Georgia', serif"; ctx.fillStyle = "#5a4530";
        const lines = note.text.split("\n");
        lines.forEach((line, i) => ctx.fillText(line, cx, cy - 30 + i * 24));

        // Dismiss hint
        ctx.font = "12px Arial"; ctx.fillStyle = "#888";
        ctx.fillText("Press SPACE or ENTER to continue...", cx, cy + ph/2 - 20);
    }

    _drawGameOver(ctx) {
        ctx.fillStyle = "rgba(0,0,0,0.65)";
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
        const cx = CONFIG.CANVAS_WIDTH / 2, cy = CONFIG.CANVAS_HEIGHT / 2;

        ctx.font = "bold 48px Arial"; ctx.fillStyle = "#ff4444";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("GAME OVER", cx, cy - 40);

        ctx.font = "20px Arial"; ctx.fillStyle = "#fff";
        ctx.fillText(`Banked ${this.rescuedCount} / ${STUCK_BUNNY_POSITIONS.length} bunnies`, cx, cy + 10);

        ctx.font = "bold 18px Arial"; ctx.fillStyle = "#aaa";
        ctx.globalAlpha = 0.5 + Math.sin(this.gameTime * 3) * 0.5;
        ctx.fillText("Press ENTER or R to Restart", cx, cy + 60);
        ctx.globalAlpha = 1;
    }

    _drawWin(ctx) {
        ctx.fillStyle = "rgba(0,40,0,0.65)";
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
        const cx = CONFIG.CANVAS_WIDTH / 2, cy = CONFIG.CANVAS_HEIGHT / 2;

        ctx.font = "bold 42px Arial"; ctx.fillStyle = "#44ff44";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("🎉 ALL BUNNIES RESCUED! 🎉", cx, cy - 60);

        ctx.font = "22px Arial"; ctx.fillStyle = "#fff";
        ctx.fillText("Sir Fluffles saved Bun Bun City!", cx, cy - 20);

        // Time & Stars (#10)
        const mins = Math.floor(this.playTimer / 60);
        const secs = Math.floor(this.playTimer % 60);
        ctx.font = "bold 20px Arial"; ctx.fillStyle = "#ffcc00";
        ctx.fillText(`Time: ${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`, cx, cy + 20);

        let stars = 1;
        if (this.playTimer < CONFIG.STAR_3_TIME) stars = 3;
        else if (this.playTimer < CONFIG.STAR_2_TIME) stars = 2;

        ctx.font = "36px serif";
        const starStr = "⭐".repeat(stars) + "☆".repeat(3 - stars);
        ctx.fillText(starStr, cx, cy + 60);

        // Star thresholds info
        ctx.font = "14px Arial"; ctx.fillStyle = "#aaa";
        ctx.fillText(`⭐⭐⭐ < ${Math.floor(CONFIG.STAR_3_TIME/60)}:00   |   ⭐⭐ < ${Math.floor(CONFIG.STAR_2_TIME/60)}:00   |   ⭐ Completed`, cx, cy + 90);

        // Best time
        if (this.bestTime > 0) {
            const bm = Math.floor(this.bestTime / 60), bs = Math.floor(this.bestTime % 60);
            ctx.fillStyle = "#ffcc44";
            ctx.fillText(`Best: ${String(bm).padStart(2,"0")}:${String(bs).padStart(2,"0")}`, cx, cy + 115);
        }

        // Notes collected
        if (this.player.notesCollected.size > 0) {
            ctx.fillStyle = "#ffffaa";
            ctx.fillText(`📜 Lore Notes: ${this.player.notesCollected.size}/${LORE_NOTES.length}`, cx, cy + 138);
        }

        ctx.font = "bold 18px Arial"; ctx.fillStyle = "#aaa";
        ctx.globalAlpha = 0.5 + Math.sin(this.gameTime * 3) * 0.5;
        ctx.fillText("Press ENTER or R to Play Again", cx, cy + 170);
        ctx.globalAlpha = 1;
    }

    // ---- Pause menu logic ----
    _handlePauseSelect(idx) {
        switch (idx) {
            case 0: // Resume
                this.state = "playing";
                this.music.start();
                break;
            case 1: // Restart Game
                this.state = "playing";
                this.restart();
                break;
            case 2: // Toggle Music
                this.musicOn = !this.musicOn;
                this.pauseItems[2] = "Music: " + (this.musicOn ? "ON" : "OFF");
                this.music.setMusicVolume(this.musicOn ? 1.0 : 0);
                break;
            case 3: // Toggle SFX
                this.sfxOn = !this.sfxOn;
                this.pauseItems[3] = "SFX: " + (this.sfxOn ? "ON" : "OFF");
                this.audio.setSfxVolume(this.sfxOn ? 1.0 : 0);
                break;
            case 4: // Game Controls
                this.showingControls = true;
                break;
            case 5: // Replay Intro
                this.music.stop();
                if (window._replayIntro) window._replayIntro();
                break;
        }
    }

    _drawPause(ctx) {
        // Draw a static snapshot of the game world behind the overlay
        ctx.save();
        const cam = this.camera;
        if (cam.zoom !== 1) {
            const cx2 = CONFIG.CANVAS_WIDTH / 2, cy2 = CONFIG.CANVAS_HEIGHT / 2;
            ctx.translate(cx2, cy2);
            ctx.scale(cam.zoom, cam.zoom);
            ctx.translate(-cx2, -cy2);
        }
        this.mapRenderer.draw(ctx, cam);
        for (const cp of this.checkpoints) cp.draw(ctx, cam, this.dayNight.nightAmount);
        for (const b of this.stuckBunnies) b.draw(ctx, cam, this.dayNight.nightAmount);
        for (const f of this.followers) f.draw(ctx, cam);
        this.rex.draw(ctx, cam, this.dayNight.nightAmount);
        this.player.draw(ctx, cam);
        this.dayNight.drawLighting(ctx, cam, this);
        ctx.restore();

        // Dark overlay
        ctx.fillStyle = "rgba(0,0,0,0.72)";
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

        const cx = CONFIG.CANVAS_WIDTH / 2;
        let y = CONFIG.CANVAS_HEIGHT / 2 - 100;

        // Title
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = "bold 36px Arial"; ctx.fillStyle = "#ffcc00";
        ctx.fillText("⏸ PAUSED", cx, y);
        y += 60;

        // Menu items
        for (let i = 0; i < this.pauseItems.length; i++) {
            const selected = i === this.pauseMenuIdx;
            ctx.font = selected ? "bold 24px Arial" : "22px Arial";
            ctx.fillStyle = selected ? "#44ff44" : "#cccccc";
            const label = (selected ? "▸ " : "  ") + this.pauseItems[i];
            ctx.fillText(label, cx, y);
            y += 40;
        }

        // Hint
        ctx.font = "14px Arial"; ctx.fillStyle = "#888";
        ctx.fillText("↑↓ Navigate  ·  ENTER Select  ·  ESC Resume", cx, y + 20);

        // Controls overlay on top
        if (this.showingControls) this._drawControls(ctx);
    }

    _drawControls(ctx) {
        ctx.fillStyle = "rgba(0,0,0,0.88)";
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

        const cx = CONFIG.CANVAS_WIDTH / 2;
        let y = 50;

        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = "bold 30px Arial"; ctx.fillStyle = "#ffcc00";
        ctx.fillText("🎮 Game Controls", cx, y);
        y += 50;

        ctx.textAlign = "left";
        const x1 = cx - 220, x2 = cx + 30;

        const controls = [
            ["WASD / Arrow Keys", "Move Sir Fluffles"],
            ["SPACE", "Dash (quick burst of speed)"],
            ["E (hold near bunny)", "Rescue a stuck bunny"],
            ["Q", "Hide in stealth bushes"],
            ["F (hold & release)", "Aim and throw a stick to distract Rex"],
            ["ESC", "Pause / Resume game"],
        ];

        ctx.font = "bold 16px Arial";
        ctx.fillStyle = "#88ddff";
        ctx.fillText("CONTROLS", x1, y);
        y += 30;

        for (const [key, desc] of controls) {
            ctx.font = "bold 15px Arial"; ctx.fillStyle = "#44ff44";
            ctx.fillText(key, x1, y);
            ctx.font = "15px Arial"; ctx.fillStyle = "#ddd";
            ctx.fillText(desc, x2, y);
            y += 26;
        }

        y += 15;
        ctx.font = "bold 16px Arial";
        ctx.fillStyle = "#88ddff";
        ctx.fillText("HOW TO PLAY", x1, y);
        y += 30;

        const tips = [
            "🐰  Find stuck bunnies on the map and hold E to rescue them.",
            "🐇  Rescued bunnies follow you in a caravan.",
            "🥕  Bring followers to a Checkpoint to bank them safely.",
            "🐕  Avoid Rex the guard dog — he scatters your followers!",
            "🌿  Hide in green bushes (Q) to become invisible to Rex.",
            "🦴  Throw sticks (F) to lure Rex away from your path.",
            "🌙  Day turns to night — visibility shrinks, Rex hears better!",
            "📜  Collect lore notes scattered around for bonus story.",
            "⭐  Rescue all bunnies as fast as you can for a star rating!",
        ];

        ctx.font = "14px Arial";
        for (const tip of tips) {
            ctx.fillStyle = "#ccccaa";
            ctx.fillText(tip, x1, y);
            y += 24;
        }

        ctx.textAlign = "center";
        ctx.font = "14px Arial"; ctx.fillStyle = "#888";
        ctx.fillText("Press ENTER, SPACE, or ESC to go back", cx, CONFIG.CANVAS_HEIGHT - 30);
    }
}

// ============================================================================
//  CUTSCENE MUSIC — Procedural mood-matched audio for each scene
//  Scene 1: Peaceful, warm, golden-hour meadow (gentle arpeggios, birdsong)
//  Scene 2: Panic & chaos (dissonant stabs, frantic pulse, rumbling bass)
//  Scene 3: Heroic determination (bold brass-like chords, rising motif)
// ============================================================================
class CutsceneMusic {
    constructor() {
        this.ctx = null;
        this.master = null;
        this.activeNodes = [];
        this.loopId = null;
    }

    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.master = this.ctx.createGain();
        this.master.gain.setValueAtTime(0.18, this.ctx.currentTime);
        this.master.connect(this.ctx.destination);
    }

    // --- Stop all current sounds with a short fade ---
    stop() {
        if (!this.ctx) return;
        if (this.loopId) { clearInterval(this.loopId); this.loopId = null; }
        const now = this.ctx.currentTime;
        this.master.gain.setValueAtTime(this.master.gain.value, now);
        this.master.gain.linearRampToValueAtTime(0, now + 0.4);
        setTimeout(() => {
            for (const n of this.activeNodes) { try { n.stop(); } catch(e){} }
            this.activeNodes = [];
            this.master.gain.setValueAtTime(0.18, this.ctx.currentTime);
        }, 500);
    }

    _osc(freq, type, vol, fadeIn, dur) {
        const ctx = this.ctx, now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(vol, now + fadeIn);
        if (dur > 0) g.gain.linearRampToValueAtTime(0, now + dur);
        osc.connect(g); g.connect(this.master);
        osc.start(now);
        if (dur > 0) osc.stop(now + dur + 0.05);
        this.activeNodes.push(osc);
        return osc;
    }

    _note(freq, dur, type, vol, delay) {
        const ctx = this.ctx, when = ctx.currentTime + delay;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, when);
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(vol, when + 0.03);
        g.gain.exponentialRampToValueAtTime(0.001, when + dur);
        osc.connect(g); g.connect(this.master);
        osc.start(when); osc.stop(when + dur + 0.05);
        this.activeNodes.push(osc);
    }

    // ---- Scene 1: Peaceful / Golden-hour meadow ----
    playScene1() {
        this.init();
        this.stop();
        setTimeout(() => {
            // Warm pad — layered sine drones in C major
            this._osc(131, "sine", 0.12, 1.0, 0);     // C3
            this._osc(165, "sine", 0.08, 1.5, 0);     // E3
            this._osc(196, "sine", 0.06, 2.0, 0);     // G3
            this._osc(262, "sine", 0.04, 2.5, 0);     // C4 shimmer

            // Gentle arpeggio loop — pentatonic notes
            const arpNotes = [523, 587, 659, 784, 880, 784, 659, 587]; // C5 D5 E5 G5 A5...
            let beatIdx = 0;
            this.loopId = setInterval(() => {
                const f = arpNotes[beatIdx % arpNotes.length];
                this._note(f, 0.6, "sine", 0.06, 0);
                // Occasional sparkle an octave up
                if (beatIdx % 3 === 0) this._note(f * 2, 0.3, "sine", 0.02, 0.15);
                beatIdx++;
            }, 400);
        }, 500);
    }

    // ---- Scene 2: Panic / Chaos ----
    playScene2() {
        this.init();
        this.stop();
        setTimeout(() => {
            // Low rumbling drone — dissonant
            this._osc(55, "sawtooth", 0.08, 0.3, 0);   // A1 rumble
            this._osc(58.5, "sawtooth", 0.06, 0.5, 0);  // Slightly detuned — tension
            this._osc(82, "triangle", 0.05, 0.4, 0);    // E2

            // Frantic heartbeat pulse
            let beat = 0;
            const chaosNotes = [
                [147, 175, 220],  // D3 F3 A3 — diminished
                [156, 196, 233],  // Eb3 G3 Bb3
                [131, 156, 196],  // C3 Eb3 G3 — C minor
                [117, 147, 175],  // Bb2 D3 F3
            ];
            this.loopId = setInterval(() => {
                const chord = chaosNotes[beat % chaosNotes.length];
                // Sharp staccato stabs
                for (const f of chord) {
                    this._note(f, 0.12, "sawtooth", 0.09, 0);
                }
                // High-pitched scatter squeaks (bunnies panicking)
                if (beat % 2 === 0) {
                    const squeak = 1200 + Math.random() * 800;
                    this._note(squeak, 0.06, "sine", 0.03, Math.random() * 0.1);
                }
                // Percussive thump (Rex footsteps)
                this._note(40, 0.08, "square", 0.12, 0);
                beat++;
            }, 200);
        }, 500);
    }

    // ---- Scene 3: Heroic / Determined ----
    playScene3() {
        this.init();
        this.stop();
        setTimeout(() => {
            // Bold low brass-like pad — C minor to Ab major (heroic minor)
            this._osc(131, "sawtooth", 0.04, 0.5, 0);  // C3
            this._osc(156, "sawtooth", 0.03, 0.8, 0);  // Eb3
            this._osc(196, "sawtooth", 0.03, 1.0, 0);  // G3

            // Rising heroic motif — repeating loop
            const motif = [
                { f: 262, d: 0.35 },  // C4
                { f: 311, d: 0.35 },  // Eb4
                { f: 392, d: 0.50 },  // G4 (held)
                { f: 440, d: 0.25 },  // Ab4
                { f: 392, d: 0.25 },  // G4
                { f: 523, d: 0.80 },  // C5 — climax, long hold
                { f: 0,   d: 0.60 },  // rest
            ];
            let noteIdx = 0;
            const playNext = () => {
                if (!this.loopId) return;
                const m = motif[noteIdx % motif.length];
                if (m.f > 0) {
                    this._note(m.f, m.d * 0.9, "triangle", 0.10, 0);
                    // Octave doubling on climax note
                    if (m.f === 523) {
                        this._note(m.f * 2, m.d * 0.6, "sine", 0.04, 0);
                        this._note(m.f / 2, m.d * 0.8, "triangle", 0.05, 0);
                    }
                }
                noteIdx++;
                this.loopId = setTimeout(playNext, m.d * 1000);
            };
            this.loopId = setTimeout(playNext, 300);
        }, 500);
    }
}

// ============================================================================
//  BOOTSTRAP — Cutscene then game start
// ============================================================================
(function() {
    const overlay = document.getElementById("cutscene-overlay");
    const scenes  = overlay.querySelectorAll("img");
    const prompt  = overlay.querySelector(".cutscene-prompt");
    const cvs     = document.getElementById("gameCanvas");
    const music   = new CutsceneMusic();
    let step = 0;
    let currentGame = null;

    const scenePlayers = [
        () => music.playScene1(),
        () => music.playScene2(),
        () => music.playScene3(),
    ];

    // Show first scene once its image loads (or immediately if cached)
    function showScene(idx) {
        scenes.forEach(img => img.classList.remove("active"));
        scenes[idx].classList.add("active");
        scenePlayers[idx]();
    }

    function startCutscene() {
        step = 0;
        overlay.style.transition = "none";
        overlay.style.opacity = "1";
        overlay.style.display = "";
        cvs.style.display = "none";
        let loaded = 0;
        scenes.forEach((img, i) => {
            const check = () => { loaded++; if (loaded === scenes.length) showScene(0); };
            if (img.complete) check();
            else { img.addEventListener("load", check, { once: true }); img.addEventListener("error", check, { once: true }); }
        });
        overlay.addEventListener("click", advance);
    }

    function advance() {
        music.init();
        step++;
        if (step < scenes.length) {
            showScene(step);
        } else {
            music.stop();
            overlay.style.transition = "opacity 0.5s ease";
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.style.display = "none";
                cvs.style.display = "";
                if (!currentGame) {
                    currentGame = new Game(cvs);
                    currentGame.run();
                } else {
                    currentGame.restart();
                }
                currentGame.state = "title";
            }, 500);
            overlay.removeEventListener("click", advance);
        }
    }

    // Replay-intro hook used by pause menu
    window._replayIntro = function() {
        if (currentGame) {
            currentGame.music.stop();
        }
        startCutscene();
    };

    // Initial cutscene start
    startCutscene();
})();
</script>
