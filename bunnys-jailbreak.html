// ============================================================================
//  UTILITY FUNCTIONS
// ============================================================================
function tileAt(col, row) {
    if (col < 0 || col >= MAP_COLS || row < 0 || row >= MAP_ROWS) return 1; // out-of-bounds = wall
    return TILE_MAP[row * MAP_COLS + col];
}

function isSolid(col, row) {
    const t = tileAt(col, row);
    return t === 1 || t === 6 || t === 8; // tree, rock, water are impassable
}

function tileCenter(col, row) {
    return { x: col * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, y: row * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2 };
}

function dist(x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    return Math.sqrt(dx * dx + dy * dy);
}

function lerp(a, b, t) { return a + (b - a) * t; }

function clamp(v, min, max) { return v < min ? min : v > max ? max : v; }

function rng(min, max) { return Math.random() * (max - min) + min; }

function rngInt(min, max) { return Math.floor(rng(min, max + 1)); }

// ============================================================================
//  LINE OF SIGHT — Bresenham-style tile walk to check wall occlusion
// ============================================================================
function hasLineOfSight(x1, y1, x2, y2) {
    const ts = CONFIG.TILE_SIZE;
    let cx = Math.floor(x1 / ts), cy = Math.floor(y1 / ts);
    const ex = Math.floor(x2 / ts), ey = Math.floor(y2 / ts);
    const dx = Math.abs(ex - cx), dy = Math.abs(ey - cy);
    const sx = cx < ex ? 1 : -1, sy = cy < ey ? 1 : -1;
    let err = dx - dy;
    while (true) {
        if (isSolid(cx, cy)) return false;
        if (cx === ex && cy === ey) break;
        const e2 = 2 * err;
        if (e2 > -dy) { err -= dy; cx += sx; }
        if (e2 < dx) { err += dx; cy += sy; }
    }
    return true;
}

// ============================================================================
//  AUDIO SYSTEM — Web Audio API synthesized sounds
// ============================================================================
class AudioSystem {
    constructor() {
        this.ctx = null;
        this.initialized = false;
    }

    init() {
        if (this.initialized) return;
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.initialized = true;
        } catch (e) {
            console.warn("Web Audio not available");
        }
    }

    _tone(freq, duration, type = "square", volume = 0.15, rampDown = true) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(volume, this.ctx.currentTime);
        if (rampDown) gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }

    playDash() { this._tone(300, 0.1, "sawtooth", 0.08); }

    playBark() {
        // Low rumble bark — two quick tones
        this._tone(100, 0.15, "sawtooth", 0.2);
        setTimeout(() => this._tone(80, 0.2, "sawtooth", 0.15), 80);
    }

    playRescue() {
        // Happy ascending chime
        [523, 659, 784, 1047].forEach((f, i) => {
            setTimeout(() => this._tone(f, 0.2, "sine", 0.12), i * 80);
        });
    }

    playCheckpoint() {
        // Two-note chime
        this._tone(660, 0.3, "sine", 0.1);
        setTimeout(() => this._tone(880, 0.4, "sine", 0.1), 150);
    }

    playCaught() {
        // Sad descending tone
        [400, 300, 200, 140].forEach((f, i) => {
            setTimeout(() => this._tone(f, 0.25, "triangle", 0.15), i * 100);
        });
    }

    playGameOver() {
        [300, 250, 200, 150, 100].forEach((f, i) => {
            setTimeout(() => this._tone(f, 0.4, "sawtooth", 0.12), i * 150);
        });
    }

    playWin() {
        [523, 587, 659, 784, 880, 1047].forEach((f, i) => {
            setTimeout(() => this._tone(f, 0.3, "sine", 0.12), i * 120);
        });
    }
}

// ============================================================================
//  PARTICLE CLASS
// ============================================================================
class Particle {
    constructor(x, y, vx, vy, life, color, size, gravity = CONFIG.PARTICLE_GRAVITY) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life;
        this.color = color; this.size = size;
        this.gravity = gravity;
        this.dead = false;
    }

    update(dt) {
        this.vy += this.gravity * dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt;
        if (this.life <= 0) this.dead = true;
    }

    draw(ctx, cam) {
        const alpha = clamp(this.life / this.maxLife, 0, 1);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        const s = this.size * alpha;
        ctx.fillRect(this.x - cam.x - s / 2, this.y - cam.y - s / 2, s, s);
        ctx.globalAlpha = 1;
    }
}

// ============================================================================
//  PARTICLE SYSTEM — Manages all particles, provides burst helpers
// ============================================================================
class ParticleSystem {
    constructor() {
        this.particles = [];
    }

    add(p) { this.particles.push(p); }

    // Dust puff for dashing
    emitDash(x, y) {
        for (let i = 0; i < CONFIG.DASH_PARTICLES_PER_FRAME; i++) {
            this.add(new Particle(
                x + rng(-6, 6), y + rng(-6, 6),
                rng(-40, 40), rng(-60, -10),
                rng(0.2, 0.5),
                "#c8b88a",
                rng(3, 7),
                50
            ));
        }
    }

    // Heart burst for rescuing
    emitHearts(x, y) {
        for (let i = 0; i < CONFIG.HEART_BURST_COUNT; i++) {
            const angle = (Math.PI * 2 / CONFIG.HEART_BURST_COUNT) * i + rng(-0.3, 0.3);
            const speed = rng(60, 160);
            this.add(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed - 40,
                rng(0.5, 1.2),
                i % 2 === 0 ? "#ff6b9d" : "#ff3366",
                rng(5, 10),
                80
            ));
        }
    }

    // "Caught!" burst — red puff
    emitCaught(x, y) {
        for (let i = 0; i < 12; i++) {
            const angle = rng(0, Math.PI * 2);
            const speed = rng(40, 120);
            this.add(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                rng(0.4, 0.8),
                "#ff4444",
                rng(4, 9),
                30
            ));
        }
    }

    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update(dt);
            if (this.particles[i].dead) this.particles.splice(i, 1);
        }
    }

    draw(ctx, cam) {
        for (const p of this.particles) p.draw(ctx, cam);
    }
}

// ============================================================================
//  CAMERA — Follows the player, clamps to world bounds
// ============================================================================
class Camera {
    constructor(viewW, viewH) {
        this.x = 0;
        this.y = 0;
        this.viewW = viewW;
        this.viewH = viewH;
        this.smoothing = 6; // Higher = snappier follow
    }

    follow(targetX, targetY, dt) {
        const goalX = targetX - this.viewW / 2;
        const goalY = targetY - this.viewH / 2;
        this.x = lerp(this.x, goalX, this.smoothing * dt);
        this.y = lerp(this.y, goalY, this.smoothing * dt);
        // Clamp to world edges
        this.x = clamp(this.x, 0, WORLD_W - this.viewW);
        this.y = clamp(this.y, 0, WORLD_H - this.viewH);
    }
}

// ============================================================================
class TextPopup {
    constructor(x, y, text, color = "#fff", size = 20, life = 1.0) {
        this.x = x; this.y = y;
        this.text = text;
        this.color = color;
        this.size = size;
        this.life = life;
        this.maxLife = life;
        this.dead = false;
    }

    update(dt) {
        this.y -= 40 * dt;
        this.life -= dt;
        if (this.life <= 0) this.dead = true;
    }

    draw(ctx, cam) {
        const alpha = clamp(this.life / this.maxLife, 0, 1);
        ctx.globalAlpha = alpha;
        ctx.font = `bold ${this.size}px Arial`;
        ctx.fillStyle = this.color;
        ctx.textAlign = "center";
        ctx.fillText(this.text, this.x - cam.x, this.y - cam.y);
        ctx.globalAlpha = 1;
    }
}

// ============================================================================
//  COLLISION HELPER — AABB-style for circle vs tile grid
//  Returns adjusted (x,y) after resolving wall penetration
// ============================================================================
function resolveWallCollision(x, y, radius) {
    const ts = CONFIG.TILE_SIZE;
    // Check surrounding tiles
    const minC = Math.floor((x - radius) / ts);
    const maxC = Math.floor((x + radius) / ts);
    const minR = Math.floor((y - radius) / ts);
    const maxR = Math.floor((y + radius) / ts);

    for (let r = minR; r <= maxR; r++) {
        for (let c = minC; c <= maxC; c++) {
            if (!isSolid(c, r)) continue;
            // Closest point on the tile AABB to the circle center
            const tileLeft = c * ts, tileTop = r * ts;
            const tileRight = tileLeft + ts, tileBottom = tileTop + ts;
            const closestX = clamp(x, tileLeft, tileRight);
            const closestY = clamp(y, tileTop, tileBottom);
            const dx = x - closestX, dy = y - closestY;
            const distSq = dx * dx + dy * dy;
            if (distSq < radius * radius && distSq > 0) {
                const d = Math.sqrt(distSq);
                const overlap = radius - d;
                x += (dx / d) * overlap;
                y += (dy / d) * overlap;
            }
        }
    }
    return { x, y };
}

// ============================================================================
//  PLAYER CLASS — Sir Fluffles 🐰 with top hat
// ============================================================================
class Player {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.speed = CONFIG.PLAYER_SPEED;
        this.radius = CONFIG.PLAYER_RADIUS;
        this.lives = CONFIG.PLAYER_LIVES;
        this.facing = 1; // 1 = right, -1 = left

        // Dash state
        this.isDashing = false;
        this.dashTimer = 0;
        this.dashCooldown = 0;
        this.dashDirX = 0;
        this.dashDirY = 0;

        // Invulnerability after being caught
        this.invulnTimer = 0;

        // Animation
        this.moveTime = 0;    // Accumulates while moving for bounce
        this.isMoving = false;

        // Rescue progress
        this.rescueTarget = null;
        this.rescueProgress = 0;
    }

    update(dt, keys, game) {
        // Timers
        if (this.dashCooldown > 0) this.dashCooldown -= dt;
        if (this.invulnTimer > 0) this.invulnTimer -= dt;

        // Dash logic
        if (this.isDashing) {
            this.dashTimer -= dt;
            if (this.dashTimer <= 0) {
                this.isDashing = false;
            } else {
                this.vx = this.dashDirX * CONFIG.PLAYER_DASH_SPEED;
                this.vy = this.dashDirY * CONFIG.PLAYER_DASH_SPEED;
                game.particles.emitDash(this.x, this.y + 10);
            }
        } else {
            // Normal movement
            let mx = 0, my = 0;
            if (keys["ArrowLeft"] || keys["KeyA"]) mx -= 1;
            if (keys["ArrowRight"] || keys["KeyD"]) mx += 1;
            if (keys["ArrowUp"] || keys["KeyW"]) my -= 1;
            if (keys["ArrowDown"] || keys["KeyS"]) my += 1;
            // Normalize diagonal
            if (mx !== 0 && my !== 0) { mx *= 0.7071; my *= 0.7071; }
            // Facing direction
            if (mx !== 0) this.facing = mx > 0 ? 1 : -1;

            // Check mud
            const tCol = Math.floor(this.x / CONFIG.TILE_SIZE);
            const tRow = Math.floor(this.y / CONFIG.TILE_SIZE);
            const onMud = tileAt(tCol, tRow) === 2;
            const speedMul = onMud ? CONFIG.MUD_SPEED_FACTOR : 1;

            this.vx = mx * this.speed * speedMul;
            this.vy = my * this.speed * speedMul;

            // Dash trigger
            if ((keys["Space"]) && this.dashCooldown <= 0 && (mx !== 0 || my !== 0)) {
                this.isDashing = true;
                this.dashTimer = CONFIG.PLAYER_DASH_DURATION;
                this.dashCooldown = CONFIG.PLAYER_DASH_COOLDOWN;
                const len = Math.sqrt(mx * mx + my * my) || 1;
                this.dashDirX = mx / len;
                this.dashDirY = my / len;
                game.audio.playDash();
            }
        }

        this.isMoving = (this.vx !== 0 || this.vy !== 0);
        if (this.isMoving) this.moveTime += dt;
        else this.moveTime = 0;

        // Apply velocity
        this.x += this.vx * dt;
        this.y += this.vy * dt;

        // Resolve wall collisions
        const resolved = resolveWallCollision(this.x, this.y, this.radius);
        this.x = resolved.x;
        this.y = resolved.y;

        // Clamp to world
        this.x = clamp(this.x, this.radius, WORLD_W - this.radius);
        this.y = clamp(this.y, this.radius, WORLD_H - this.radius);

        // Rescue mechanic
        if (keys["KeyE"] && !this.isDashing) {
            // Find nearest un-rescued bunny in range
            let nearest = null, nearestDist = Infinity;
            for (const b of game.stuckBunnies) {
                if (b.rescued) continue;
                const d = dist(this.x, this.y, b.x, b.y);
                if (d < CONFIG.RESCUE_RANGE && d < nearestDist) {
                    nearestDist = d;
                    nearest = b;
                }
            }
            if (nearest) {
                if (this.rescueTarget !== nearest) {
                    this.rescueTarget = nearest;
                    this.rescueProgress = 0;
                }
                this.rescueProgress += dt;
                if (this.rescueProgress >= CONFIG.RESCUE_TIME) {
                    nearest.rescue(game);
                    this.rescueTarget = null;
                    this.rescueProgress = 0;
                }
            } else {
                this.rescueTarget = null;
                this.rescueProgress = 0;
            }
        } else {
            this.rescueTarget = null;
            this.rescueProgress = 0;
        }
    }

    draw(ctx, cam) {
        const sx = this.x - cam.x;
        const sy = this.y - cam.y;

        // Bounce offset while moving
        const bounce = this.isMoving ? Math.sin(this.moveTime * 10) * 3 : 0;
        const drawY = sy + bounce;

        // Invulnerability blink
        if (this.invulnTimer > 0 && Math.floor(this.invulnTimer * 8) % 2 === 0) return;

        ctx.save();
        ctx.translate(sx, drawY);
        if (this.facing < 0) ctx.scale(-1, 1);

        // Body — bunny emoji
        ctx.font = "28px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🐰", 0, 3);

        // Top hat — drawn with canvas primitives
        ctx.fillStyle = "#1a1a1a";
        // Hat brim
        ctx.fillRect(-10, -18, 20, 4);
        // Hat crown
        ctx.fillRect(-7, -30, 14, 13);
        // Hat band
        ctx.fillStyle = "#cc3333";
        ctx.fillRect(-7, -20, 14, 3);

        ctx.restore();
    }
}

// ============================================================================
//  REX CLASS — The Enemy 🐕 with state machine AI
//  States: "wander", "chase", "return"
// ============================================================================
class Rex {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.radius = CONFIG.REX_RADIUS;
        this.state = "wander";

        // Wander
        this.wanderDirX = 0;
        this.wanderDirY = 0;
        this.wanderTimer = 0;

        // Chase
        this.barkTimer = 0;

        // Animation
        this.moveTime = 0;
        this.isMoving = false;
        this.facing = 1;

        // Pathfinding — simple: chase directly if line of sight,
        // otherwise pick a nearby open tile to get closer
        this.pathTarget = null;

        // Home position for return state
        this.homeX = x;
        this.homeY = y;
    }

    update(dt, game) {
        const player = game.player;
        const d = dist(this.x, this.y, player.x, player.y);
        const los = hasLineOfSight(this.x, this.y, player.x, player.y);

        switch (this.state) {
            case "wander":
                this._wander(dt, game);
                // Detect player
                if (d < CONFIG.REX_DETECT_RADIUS && los) {
                    this.state = "chase";
                    this.barkTimer = 0;
                    game.audio.playBark();
                    game.textPopups.push(new TextPopup(this.x, this.y - 30, "WOOF!", "#ff6600", 24, 0.8));
                }
                break;

            case "chase":
                this._chase(dt, game, player);
                // Bark periodically
                this.barkTimer += dt;
                if (this.barkTimer >= CONFIG.REX_BARK_INTERVAL) {
                    this.barkTimer = 0;
                    game.audio.playBark();
                    game.textPopups.push(new TextPopup(this.x, this.y - 30, "WOOF!", "#ff6600", 24, 0.8));
                }
                // Lose player
                if (d > CONFIG.REX_LOSE_RADIUS || (!los && d > CONFIG.REX_DETECT_RADIUS)) {
                    this.state = "wander";
                    this.wanderTimer = 0;
                }
                // Catch player
                if (d < CONFIG.REX_CATCH_DIST && player.invulnTimer <= 0) {
                    game.playerCaught();
                }
                break;

            case "return":
                // Return to home after player respawns
                this._moveToward(this.homeX, this.homeY, CONFIG.REX_WANDER_SPEED, dt);
                if (dist(this.x, this.y, this.homeX, this.homeY) < 10) {
                    this.state = "wander";
                }
                // Still detect during return
                if (d < CONFIG.REX_DETECT_RADIUS && los) {
                    this.state = "chase";
                    this.barkTimer = 0;
                    game.audio.playBark();
                    game.textPopups.push(new TextPopup(this.x, this.y - 30, "WOOF!", "#ff6600", 24, 0.8));
                }
                break;
        }

        // Resolve wall collisions
        const resolved = resolveWallCollision(this.x, this.y, this.radius);
        this.x = resolved.x;
        this.y = resolved.y;
    }

    _wander(dt, game) {
        this.wanderTimer -= dt;
        if (this.wanderTimer <= 0) {
            const angle = rng(0, Math.PI * 2);
            this.wanderDirX = Math.cos(angle);
            this.wanderDirY = Math.sin(angle);
            this.wanderTimer = rng(1.5, CONFIG.REX_WANDER_CHANGE);
        }
        this._applyMovement(this.wanderDirX, this.wanderDirY, CONFIG.REX_WANDER_SPEED, dt);
    }

    _chase(dt, game, player) {
        // Direct chase if line of sight, otherwise simple steering
        const los = hasLineOfSight(this.x, this.y, player.x, player.y);
        if (los) {
            this._moveToward(player.x, player.y, CONFIG.REX_CHASE_SPEED, dt);
        } else {
            // Try to navigate around obstacles — pick the open adjacent tile closest to player
            this._pathfindStep(player.x, player.y, CONFIG.REX_CHASE_SPEED, dt);
        }
    }

    _moveToward(tx, ty, speed, dt) {
        const dx = tx - this.x, dy = ty - this.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > 1) {
            this._applyMovement(dx / d, dy / d, speed, dt);
        }
    }

    _pathfindStep(targetX, targetY, speed, dt) {
        // Simple greedy pathfinding: evaluate 8 directions, pick the one
        // that is walkable and closest to the target
        const ts = CONFIG.TILE_SIZE;
        const dirs = [
            {dx: 1, dy: 0}, {dx: -1, dy: 0}, {dx: 0, dy: 1}, {dx: 0, dy: -1},
            {dx: 1, dy: 1}, {dx: 1, dy: -1}, {dx: -1, dy: 1}, {dx: -1, dy: -1},
        ];
        let bestDir = null, bestDist = Infinity;
        const curCol = Math.floor(this.x / ts);
        const curRow = Math.floor(this.y / ts);

        for (const dir of dirs) {
            const nc = curCol + dir.dx;
            const nr = curRow + dir.dy;
            if (isSolid(nc, nr)) continue;
            // For diagonal, also check both adjacent cardinals are open
            if (dir.dx !== 0 && dir.dy !== 0) {
                if (isSolid(curCol + dir.dx, curRow) || isSolid(curCol, curRow + dir.dy)) continue;
            }
            const cx = nc * ts + ts / 2;
            const cy = nr * ts + ts / 2;
            const d = dist(cx, cy, targetX, targetY);
            if (d < bestDist) {
                bestDist = d;
                bestDir = { x: cx, y: cy };
            }
        }
        if (bestDir) {
            this._moveToward(bestDir.x, bestDir.y, speed, dt);
        } else {
            // Fallback: just try to move toward target directly
            this._moveToward(targetX, targetY, speed * 0.5, dt);
        }
    }

    _applyMovement(dirX, dirY, speed, dt) {
        this.x += dirX * speed * dt;
        this.y += dirY * speed * dt;
        this.isMoving = true;
        this.moveTime += dt;
        if (dirX !== 0) this.facing = dirX > 0 ? 1 : -1;
    }

    draw(ctx, cam) {
        const sx = this.x - cam.x;
        const sy = this.y - cam.y;
        const bounce = this.isMoving ? Math.sin(this.moveTime * 8) * 4 : 0;
        const drawY = sy + bounce;

        ctx.save();
        ctx.translate(sx, drawY);
        if (this.facing < 0) ctx.scale(-1, 1);

        // Rex emoji — scaled up 2x
        ctx.font = "48px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🐕", 0, 0);

        // Chase indicator — red glow
        if (this.state === "chase") {
            ctx.globalAlpha = 0.15 + Math.sin(this.moveTime * 6) * 0.1;
            ctx.fillStyle = "#ff0000";
            ctx.beginPath();
            ctx.arc(0, 0, 32, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        ctx.restore();
        this.isMoving = false;
    }
}

// ============================================================================
//  STUCK BUNNY CLASS — 🐇 trembling, waiting to be rescued
// ============================================================================
class StuckBunny {
    constructor(col, row) {
        const pos = tileCenter(col, row);
        this.x = pos.x;
        this.y = pos.y;
        this.col = col;
        this.row = row;
        this.rescued = false;
        this.rescueAnim = 0; // Timer for happy jump after rescue
        this.time = rng(0, 10); // Offset for trembling
    }

    update(dt) {
        this.time += dt;
        if (this.rescued && this.rescueAnim > 0) {
            this.rescueAnim -= dt;
        }
    }

    rescue(game) {
        this.rescued = true;
        this.rescueAnim = 0.8;
        game.particles.emitHearts(this.x, this.y);
        game.audio.playRescue();
        game.rescuedCount++;
        game.textPopups.push(new TextPopup(this.x, this.y - 20, "Rescued! ❤️", "#ff69b4", 18, 1.2));
        if (game.rescuedCount >= STUCK_BUNNY_POSITIONS.length) {
            game.winGame();
        }
    }

    draw(ctx, cam) {
        if (this.rescued && this.rescueAnim <= 0) return;

        const sx = this.x - cam.x;
        const sy = this.y - cam.y;

        // Trembling = rapid tiny random offset
        const tremble = this.rescued ? 0 : Math.sin(this.time * 30) * 1.5;
        // Happy jump when rescued
        const jumpY = this.rescued ? -Math.sin((0.8 - this.rescueAnim) / 0.8 * Math.PI) * 30 : 0;

        const alpha = this.rescued ? clamp(this.rescueAnim / 0.3, 0, 1) : 1;
        ctx.globalAlpha = alpha;

        ctx.font = "22px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🐇", sx + tremble, sy + jumpY);

        // Exclamation mark if not rescued — help me!
        if (!this.rescued) {
            ctx.font = "bold 14px Arial";
            ctx.fillStyle = "#ff4444";
            ctx.fillText("❗", sx, sy - 20 + Math.sin(this.time * 3) * 3);
        }

        ctx.globalAlpha = 1;
    }
}

// ============================================================================
//  CHECKPOINT CLASS — Carrot Shrine
// ============================================================================
class Checkpoint {
    constructor(col, row) {
        const pos = tileCenter(col, row);
        this.x = pos.x;
        this.y = pos.y;
        this.col = col;
        this.row = row;
        this.activated = false;
        this.time = 0;
    }

    update(dt) {
        this.time += dt;
    }

    draw(ctx, cam) {
        const sx = this.x - cam.x;
        const sy = this.y - cam.y;

        // Glow
        const glowAlpha = this.activated ? 0.25 + Math.sin(this.time * 3) * 0.1 : 0.08;
        const glowColor = this.activated ? "#ffaa00" : "#666666";
        ctx.fillStyle = glowColor;
        ctx.globalAlpha = glowAlpha;
        ctx.beginPath();
        ctx.arc(sx, sy, 24, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Carrot emoji
        ctx.font = "26px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🥕", sx, sy + Math.sin(this.time * 2) * 2);

        // Activated ring
        if (this.activated) {
            ctx.strokeStyle = "#ffcc00";
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.5 + Math.sin(this.time * 4) * 0.3;
            ctx.beginPath();
            ctx.arc(sx, sy, 20, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }
    }
}

// ============================================================================
//  MAP RENDERER — Draws the tile map (only visible tiles for performance)
// ============================================================================
class MapRenderer {
    constructor() {
        // Grass color variations (seeded by position for consistency)
        this.grassVariants = ["#5a8a3c", "#4d7a33", "#63943f", "#578637"];
    }

    draw(ctx, cam) {
        const ts = CONFIG.TILE_SIZE;
        const startCol = Math.max(0, Math.floor(cam.x / ts));
        const startRow = Math.max(0, Math.floor(cam.y / ts));
        const endCol = Math.min(MAP_COLS - 1, Math.ceil((cam.x + cam.viewW) / ts));
        const endRow = Math.min(MAP_ROWS - 1, Math.ceil((cam.y + cam.viewH) / ts));

        for (let r = startRow; r <= endRow; r++) {
            for (let c = startCol; c <= endCol; c++) {
                const tile = tileAt(c, r);
                const x = c * ts - cam.x;
                const y = r * ts - cam.y;

                // Base grass everywhere
                ctx.fillStyle = this.grassVariants[(c + r * 3) % this.grassVariants.length];
                ctx.fillRect(x, y, ts, ts);

                switch (tile) {
                    case 1: // Tree / Wall
                        this._drawTree(ctx, x, y, ts, c, r);
                        break;
                    case 2: // Mud
                        ctx.fillStyle = "#8B7355";
                        ctx.fillRect(x + 1, y + 1, ts - 2, ts - 2);
                        // Mud splotches
                        ctx.fillStyle = "#7a6348";
                        ctx.beginPath();
                        ctx.arc(x + ts * 0.3, y + ts * 0.6, 6, 0, Math.PI * 2);
                        ctx.arc(x + ts * 0.7, y + ts * 0.3, 5, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 4: // Hollow Log
                        ctx.fillStyle = "#6d4c2a";
                        ctx.fillRect(x + 8, y + 14, ts - 16, ts - 28);
                        ctx.fillStyle = "#4a3318";
                        ctx.beginPath();
                        ctx.arc(x + ts / 2, y + ts / 2, 8, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 5: // Bush
                        ctx.font = "20px serif";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText("🌿", x + ts / 2, y + ts / 2);
                        break;
                    case 6: // Rock
                        ctx.fillStyle = "#888888";
                        ctx.beginPath();
                        ctx.arc(x + ts / 2, y + ts / 2 + 4, 16, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = "#999999";
                        ctx.beginPath();
                        ctx.arc(x + ts / 2 - 3, y + ts / 2, 12, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 7: // Flowers
                        ctx.font = "16px serif";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        const flowers = ["🌸", "🌼", "💐"];
                        ctx.fillText(flowers[(c + r) % 3], x + ts / 2, y + ts / 2);
                        break;
                    case 8: // Water
                        ctx.fillStyle = "#3366aa";
                        ctx.fillRect(x, y, ts, ts);
                        ctx.fillStyle = "#4488cc";
                        ctx.globalAlpha = 0.4;
                        // Animated wave lines
                        const waveOffset = Math.sin(performance.now() / 500 + c + r) * 4;
                        ctx.fillRect(x + 4, y + 12 + waveOffset, ts - 8, 3);
                        ctx.fillRect(x + 8, y + 28 - waveOffset, ts - 16, 2);
                        ctx.globalAlpha = 1;
                        break;
                }
            }
        }
    }

    _drawTree(ctx, x, y, ts, c, r) {
        // Trunk
        ctx.fillStyle = "#5c3d1e";
        ctx.fillRect(x + ts / 2 - 5, y + ts / 2, 10, ts / 2);
        // Canopy — circle
        const canopyColor = (c + r) % 3 === 0 ? "#2d6b2d" : (c + r) % 3 === 1 ? "#1e5f1e" : "#3a7a3a";
        ctx.fillStyle = canopyColor;
        ctx.beginPath();
        ctx.arc(x + ts / 2, y + ts / 3, 18, 0, Math.PI * 2);
        ctx.fill();
        // Highlight
        ctx.fillStyle = "#4a9a4a";
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.arc(x + ts / 2 - 4, y + ts / 3 - 4, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

// ============================================================================
//  HUD — Draws lives, rescue count, dash cooldown, rescue progress bar
// ============================================================================
class HUD {
    constructor() {}

    draw(ctx, game) {
        const p = game.player;

        // Lives (carrot icons)
        ctx.font = "24px serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        for (let i = 0; i < p.lives; i++) {
            ctx.fillText("🥕", 12 + i * 30, 12);
        }

        // Rescued count
        ctx.font = "bold 16px Arial";
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "left";
        ctx.fillText(`Rescued: ${game.rescuedCount} / ${STUCK_BUNNY_POSITIONS.length}`, 12, 44);

        // Dash cooldown bar
        const dashPct = p.dashCooldown > 0 ? 1 - p.dashCooldown / CONFIG.PLAYER_DASH_COOLDOWN : 1;
        ctx.fillStyle = "#333";
        ctx.fillRect(12, 68, 100, 8);
        ctx.fillStyle = dashPct >= 1 ? "#00ccff" : "#006688";
        ctx.fillRect(12, 68, 100 * dashPct, 8);
        ctx.font = "10px Arial";
        ctx.fillStyle = "#aaa";
        ctx.fillText("DASH [SPACE]", 12, 82);

        // Rescue progress arc (drawn over the bunny in world space — handled separately)
    }

    drawRescueProgress(ctx, cam, game) {
        const p = game.player;
        if (!p.rescueTarget || p.rescueProgress <= 0) return;

        const b = p.rescueTarget;
        const sx = b.x - cam.x;
        const sy = b.y - cam.y;
        const pct = p.rescueProgress / CONFIG.RESCUE_TIME;

        // Background circle
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(sx, sy - 20, 14, 0, Math.PI * 2);
        ctx.stroke();

        // Progress arc
        ctx.strokeStyle = "#00ff88";
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.arc(sx, sy - 20, 14, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct);
        ctx.stroke();
        ctx.lineCap = "butt";

        // "E" label
        ctx.font = "bold 11px Arial";
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("E", sx, sy - 20);
    }
}

// ============================================================================
//  MINIMAP — Top-right corner overview showing Rex (red) and bunnies (blue)
// ============================================================================
class Minimap {
    draw(ctx, game) {
        const size = CONFIG.MINIMAP_SIZE;
        const margin = CONFIG.MINIMAP_MARGIN;
        const ox = CONFIG.CANVAS_WIDTH - size - margin;
        const oy = margin;
        const scaleX = size / WORLD_W;
        const scaleY = size / WORLD_H;

        // Background
        ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
        ctx.fillRect(ox - 2, oy - 2, size + 4, size + 4);

        // Tiles (simplified — just walls)
        const ts = CONFIG.TILE_SIZE;
        const ts_mini_w = ts * scaleX;
        const ts_mini_h = ts * scaleY;
        for (let r = 0; r < MAP_ROWS; r++) {
            for (let c = 0; c < MAP_COLS; c++) {
                const t = tileAt(c, r);
                if (t === 1 || t === 6) {
                    ctx.fillStyle = "#2a3a1a";
                    ctx.fillRect(ox + c * ts_mini_w, oy + r * ts_mini_h, ts_mini_w + 0.5, ts_mini_h + 0.5);
                } else if (t === 8) {
                    ctx.fillStyle = "#224488";
                    ctx.fillRect(ox + c * ts_mini_w, oy + r * ts_mini_h, ts_mini_w + 0.5, ts_mini_h + 0.5);
                }
            }
        }

        // Stuck bunnies (blue dots)
        for (const b of game.stuckBunnies) {
            if (b.rescued) continue;
            ctx.fillStyle = "#4488ff";
            ctx.beginPath();
            ctx.arc(ox + b.x * scaleX, oy + b.y * scaleY, 2.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // Rex (red dot)
        ctx.fillStyle = "#ff3333";
        ctx.beginPath();
        ctx.arc(ox + game.rex.x * scaleX, oy + game.rex.y * scaleY, 3.5, 0, Math.PI * 2);
        ctx.fill();

        // Player (green dot)
        ctx.fillStyle = "#00ff66";
        ctx.beginPath();
        ctx.arc(ox + game.player.x * scaleX, oy + game.player.y * scaleY, 3, 0, Math.PI * 2);
        ctx.fill();

        // Viewport rectangle
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 1;
        ctx.strokeRect(
            ox + game.camera.x * scaleX,
            oy + game.camera.y * scaleY,
            game.camera.viewW * scaleX,
            game.camera.viewH * scaleY
        );
    }
}

// ============================================================================
//  GAME CLASS — Main orchestrator
// ============================================================================
class Game {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext("2d");
        canvas.width = CONFIG.CANVAS_WIDTH;
        canvas.height = CONFIG.CANVAS_HEIGHT;

        // Systems
        this.audio = new AudioSystem();
        this.camera = new Camera(CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
        this.particles = new ParticleSystem();
        this.mapRenderer = new MapRenderer();
        this.hud = new HUD();
        this.minimap = new Minimap();

        // Game state
        this.state = "title"; // "title", "playing", "gameover", "win"
        this.rescuedCount = 0;
        this.textPopups = [];

        // Input
        this.keys = {};
        this.keyJustPressed = {};
        this._setupInput();

        // Entities
        this.player = null;
        this.rex = null;
        this.stuckBunnies = [];
        this.checkpoints = [];
        this.activeCheckpoint = null;

        // Timing
        this.lastTime = 0;
        this.gameTime = 0;

        // "Caught" freeze frame
        this.freezeTimer = 0;
        this.caughtMessage = null;

        this._initEntities();
    }

    _setupInput() {
        window.addEventListener("keydown", (e) => {
            this.keys[e.code] = true;
            this.keyJustPressed[e.code] = true;
            // Only initialize audio on first user interaction
            this.audio.init();
            e.preventDefault();
        });
        window.addEventListener("keyup", (e) => {
            this.keys[e.code] = false;
            e.preventDefault();
        });
    }

    _initEntities() {
        // Player
        const startPos = tileCenter(PLAYER_START.col, PLAYER_START.row);
        this.player = new Player(startPos.x, startPos.y);

        // Rex
        const rexPos = tileCenter(REX_START.col, REX_START.row);
        this.rex = new Rex(rexPos.x, rexPos.y);

        // Stuck bunnies
        this.stuckBunnies = STUCK_BUNNY_POSITIONS.map(p => new StuckBunny(p.col, p.row));

        // Checkpoints — find all '3' tiles in the map
        this.checkpoints = [];
        for (let r = 0; r < MAP_ROWS; r++) {
            for (let c = 0; c < MAP_COLS; c++) {
                if (tileAt(c, r) === 3) {
                    this.checkpoints.push(new Checkpoint(c, r));
                }
            }
        }

        // Activate starting checkpoint
        if (this.checkpoints.length > 0) {
            this.checkpoints[0].activated = true;
            this.activeCheckpoint = this.checkpoints[0];
        }

        this.rescuedCount = 0;
        this.textPopups = [];
    }

    playerCaught() {
        this.player.lives--;
        this.player.invulnTimer = CONFIG.PLAYER_HIT_INVULN;
        this.audio.playCaught();
        this.particles.emitCaught(this.player.x, this.player.y);
        this.freezeTimer = 0.6;
        this.caughtMessage = new TextPopup(this.player.x, this.player.y - 20, "CAUGHT!", "#ff2222", 28, 1.5);
        this.textPopups.push(this.caughtMessage);

        if (this.player.lives <= 0) {
            this.state = "gameover";
            this.audio.playGameOver();
            return;
        }

        // Respawn at the active checkpoint
        if (this.activeCheckpoint) {
            this.player.x = this.activeCheckpoint.x;
            this.player.y = this.activeCheckpoint.y;
        }
        // Send Rex back to patrol
        this.rex.state = "return";
    }

    winGame() {
        this.state = "win";
        this.audio.playWin();
    }

    restart() {
        this.state = "playing";
        this._initEntities();
        const startPos = tileCenter(PLAYER_START.col, PLAYER_START.row);
        this.camera.x = startPos.x - CONFIG.CANVAS_WIDTH / 2;
        this.camera.y = startPos.y - CONFIG.CANVAS_HEIGHT / 2;
    }

    // --- Main Loop ---
    run() {
        this.lastTime = performance.now();
        const loop = (now) => {
            const rawDt = (now - this.lastTime) / 1000;
            const dt = Math.min(rawDt, 0.05); // Cap deltaTime to prevent physics tunneling
            this.lastTime = now;
            this.gameTime += dt;

            this._update(dt);
            this._draw();

            // Clear just-pressed
            this.keyJustPressed = {};

            requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
    }

    _update(dt) {
        switch (this.state) {
            case "title":
                if (this.keyJustPressed["Enter"] || this.keyJustPressed["Space"]) {
                    this.state = "playing";
                    this.audio.init();
                }
                break;

            case "playing":
                // Freeze frame after being caught
                if (this.freezeTimer > 0) {
                    this.freezeTimer -= dt;
                    this.particles.update(dt);
                    // Update text popups during freeze
                    for (let i = this.textPopups.length - 1; i >= 0; i--) {
                        this.textPopups[i].update(dt);
                        if (this.textPopups[i].dead) this.textPopups.splice(i, 1);
                    }
                    return;
                }

                this.player.update(dt, this.keys, this);
                this.rex.update(dt, this);

                // Update bunnies
                for (const b of this.stuckBunnies) b.update(dt);

                // Checkpoints
                for (const cp of this.checkpoints) {
                    cp.update(dt);
                    if (!cp.activated && dist(this.player.x, this.player.y, cp.x, cp.y) < 30) {
                        cp.activated = true;
                        this.activeCheckpoint = cp;
                        this.audio.playCheckpoint();
                        this.textPopups.push(new TextPopup(cp.x, cp.y - 20, "Checkpoint!", "#ffcc00", 18, 1.0));
                    }
                }

                // Camera
                this.camera.follow(this.player.x, this.player.y, dt);

                // Particles
                this.particles.update(dt);

                // Text popups
                for (let i = this.textPopups.length - 1; i >= 0; i--) {
                    this.textPopups[i].update(dt);
                    if (this.textPopups[i].dead) this.textPopups.splice(i, 1);
                }
                break;

            case "gameover":
            case "win":
                if (this.keyJustPressed["Enter"] || this.keyJustPressed["KeyR"]) {
                    this.restart();
                }
                // Still update particles for visual polish
                this.particles.update(dt);
                for (let i = this.textPopups.length - 1; i >= 0; i--) {
                    this.textPopups[i].update(dt);
                    if (this.textPopups[i].dead) this.textPopups.splice(i, 1);
                }
                break;
        }
    }

    _draw() {
        const ctx = this.ctx;
        const cam = this.camera;

        // Clear
        ctx.fillStyle = "#2a3a2a";
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

        switch (this.state) {
            case "title":
                this._drawTitle(ctx);
                break;

            case "playing":
            case "gameover":
            case "win":
                // World
                this.mapRenderer.draw(ctx, cam);

                // Checkpoints (under entities)
                for (const cp of this.checkpoints) cp.draw(ctx, cam);

                // Stuck bunnies
                for (const b of this.stuckBunnies) b.draw(ctx, cam);

                // Rex
                this.rex.draw(ctx, cam);

                // Player
                this.player.draw(ctx, cam);

                // Particles (on top of entities)
                this.particles.draw(ctx, cam);

                // Rescue progress arc
                this.hud.drawRescueProgress(ctx, cam, this);

                // Text popups
                for (const tp of this.textPopups) tp.draw(ctx, cam);

                // HUD
                this.hud.draw(ctx, this);

                // Minimap
                this.minimap.draw(ctx, this);

                // Overlays
                if (this.state === "gameover") this._drawGameOver(ctx);
                if (this.state === "win") this._drawWin(ctx);
                break;
        }
    }

    _drawTitle(ctx) {
        const cx = CONFIG.CANVAS_WIDTH / 2;
        const cy = CONFIG.CANVAS_HEIGHT / 2;

        // Background gradient
        const grad = ctx.createLinearGradient(0, 0, 0, CONFIG.CANVAS_HEIGHT);
        grad.addColorStop(0, "#1a3a1a");
        grad.addColorStop(1, "#0a200a");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

        // Drifting grass blades (decorative)
        ctx.fillStyle = "#2a5a2a";
        for (let i = 0; i < 30; i++) {
            const x = (i * 37 + this.gameTime * 10) % CONFIG.CANVAS_WIDTH;
            const y = 100 + (i * 29) % (CONFIG.CANVAS_HEIGHT - 200);
            ctx.fillRect(x, y, 2, 12 + Math.sin(this.gameTime + i) * 4);
        }

        // Title
        ctx.font = "bold 52px Arial";
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🐰 Bunny's Jailbreak! 🐰", cx, cy - 100);

        // Subtitle
        ctx.font = "20px Arial";
        ctx.fillStyle = "#aaddaa";
        ctx.fillText("Sir Fluffles must rescue the citizens of Bun Bun City!", cx, cy - 50);

        // Instructions
        ctx.font = "16px Arial";
        ctx.fillStyle = "#88bb88";
        const instructions = [
            "WASD / Arrow Keys — Move",
            "SPACE — Dash (when moving)",
            "E (hold) — Rescue stuck bunnies",
            "",
            "Avoid Rex the German Shepherd! 🐕",
            "Rescue all 10 bunnies to win!",
        ];
        instructions.forEach((line, i) => {
            ctx.fillText(line, cx, cy + 20 + i * 28);
        });

        // Start prompt
        ctx.font = "bold 22px Arial";
        ctx.fillStyle = "#ffffff";
        ctx.globalAlpha = 0.5 + Math.sin(this.gameTime * 3) * 0.5;
        ctx.fillText("Press ENTER or SPACE to Start", cx, cy + 220);
        ctx.globalAlpha = 1;
    }

    _drawGameOver(ctx) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

        const cx = CONFIG.CANVAS_WIDTH / 2;
        const cy = CONFIG.CANVAS_HEIGHT / 2;

        ctx.font = "bold 48px Arial";
        ctx.fillStyle = "#ff4444";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("GAME OVER", cx, cy - 40);

        ctx.font = "20px Arial";
        ctx.fillStyle = "#ffffff";
        ctx.fillText(`You rescued ${this.rescuedCount} / ${STUCK_BUNNY_POSITIONS.length} bunnies`, cx, cy + 10);

        ctx.font = "bold 18px Arial";
        ctx.fillStyle = "#aaaaaa";
        ctx.globalAlpha = 0.5 + Math.sin(this.gameTime * 3) * 0.5;
        ctx.fillText("Press ENTER or R to Restart", cx, cy + 60);
        ctx.globalAlpha = 1;
    }

    _drawWin(ctx) {
        ctx.fillStyle = "rgba(0, 40, 0, 0.65)";
        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

        const cx = CONFIG.CANVAS_WIDTH / 2;
        const cy = CONFIG.CANVAS_HEIGHT / 2;

        ctx.font = "bold 48px Arial";
        ctx.fillStyle = "#44ff44";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🎉 ALL BUNNIES RESCUED! 🎉", cx, cy - 40);

        ctx.font = "22px Arial";
        ctx.fillStyle = "#ffffff";
        ctx.fillText("Sir Fluffles saved Bun Bun City!", cx, cy + 20);

        ctx.font = "bold 18px Arial";
        ctx.fillStyle = "#aaaaaa";
        ctx.globalAlpha = 0.5 + Math.sin(this.gameTime * 3) * 0.5;
        ctx.fillText("Press ENTER or R to Play Again", cx, cy + 70);
        ctx.globalAlpha = 1;
    }
}

// ============================================================================
//  BOOTSTRAP — Create game and start the loop
// ============================================================================
const canvas = document.getElementById("gameCanvas");
const game = new Game(canvas);
game.run();
</script>
</body>
